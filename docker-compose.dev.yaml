services:
  tracy-next:
    container_name: tracy_next
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        BUILD_ID: "1"
      no_cache: true
      pull: true
    image: tracy/next
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - API_URL=http://host.docker.internal:8080  # était localhost:8080
    networks:
      - nginx-network

networks:
  nginx-network:
    external: true