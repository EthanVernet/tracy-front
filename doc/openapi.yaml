openapi: 3.0.0

info:
  title: Tracy API
  version: 1.0.0
  description: |
    Tracy API — management of Ollama models, RAG collections (Qdrant),
    conversational agents, conversations, messages, and inference (SSE chat + structured extraction).
  contact:
    email: cadence.ai.tracy@gmail.com

servers:
  - url: http://localhost:9090
    description: Local
  - url: https://your-domain.com
    description: Production

tags:
  - name: Model
    description: Ollama model management (download, deletion, listing)
  - name: Collection
    description: Qdrant vector collection management and indexed file management
  - name: Agent
    description: Management of RAG agents and extractor agents
  - name: Conversation
    description: Management of conversations associated with an agent
  - name: Message
    description: Retrieval of messages within a conversation
  - name: Inference
    description: SSE streaming chat and structured data extraction

# ─── Paths ────────────────────────────────────────────────────────────────────

paths:

  # ─── Model ──────────────────────────────────────────────────────────────────

  /model:
    get:
      tags: [Model]
      summary: List available models
      description: Returns the list of all Ollama models currently downloaded on the server.
      operationId: listModels
      responses:
        '200':
          description: List of models
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListModelsResponse'
              example:
                status: 200
                result: [llama3.2, nomic-embed-text]
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags: [Model]
      summary: Delete a model
      description: Deletes a locally downloaded Ollama model.
      operationId: deleteModel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteModelRequest'
      responses:
        '200':
          description: Model deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteModelResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /model/download:
    post:
      tags: [Model]
      summary: Download a model (SSE stream)
      description: |
        Starts the download of an Ollama model and streams the progress
        via **Server-Sent Events**. Each SSE event carries an integer
        representing the completion percentage (0 → 100).
      operationId: downloadModel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DownloadModelRequest'
      responses:
        '200':
          description: SSE progress stream
          content:
            text/event-stream:
              schema:
                type: integer
                description: Completion percentage (0-100)
                example: 42
        '500':
          $ref: '#/components/responses/InternalError'

  # ─── Collection ─────────────────────────────────────────────────────────────

  /collection:
    get:
      tags: [Collection]
      summary: List all collections
      description: Returns the list of existing Qdrant vector collections.
      operationId: listCollections
      responses:
        '200':
          description: List of collections
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCollectionResponse'
              example:
                status: 200
                result: [documents, contracts, faq]
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Collection]
      summary: Create a vector collection (SSE stream)
      description: |
        Creates a new empty Qdrant collection with the specified vector dimension.
        Progress is streamed via **Server-Sent Events** (100 at the end of creation).
        The `size` field must match the output dimension of the embedding model used
        (e.g. 768 for `nomic-embed-text`).
      operationId: createCollection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCollectionRequest'
      responses:
        '200':
          description: SSE stream — integer 100 at completion
          content:
            text/event-stream:
              schema:
                type: integer
                example: 100
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags: [Collection]
      summary: Delete a collection
      description: Deletes a Qdrant collection and all the vectors it contains.
      operationId: deleteCollection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteCollectionRequest'
      responses:
        '200':
          description: Collection deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteCollectionResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  # ─── Collection / File ──────────────────────────────────────────────────────

  /collection/file:
    get:
      tags: [Collection]
      summary: List files in a collection
      description: |
        Returns the list of unique files indexed in a Qdrant collection,
        deduplicated from the payloads of vector points.
        The collection name is passed in the **request body** (JSON).
      operationId: listFiles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListFilesRequest'
      responses:
        '200':
          description: List of indexed files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListFilesResponse'
              example:
                status: 200
                result: [report_q3.pdf, contract_smith.docx]
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Collection]
      summary: Upload and index a file
      description: |
        Sends a file via `multipart/form-data`, extracts its text content,
        splits it into chunks, and indexes the vectors into the target Qdrant collection.
        In case of partial failure, already-inserted points are deleted (rollback).

        The `collection` and `model` fields are **required**.

        **Supported formats:**
        | Extension | Type |
        |---|---|
        | `.pdf` | PDF |
        | `.docx` | Word (Office Open XML) |
        | `.doc` | Word (legacy binary format) |
        | `.odt` | OpenDocument Text |
        | `.pptx` | PowerPoint |
        | `.xlsx` `.xls` `.xlsm` | Excel |
        | `.csv` | CSV |
        | `.html` `.htm` | HTML |
        | Others | Read as plain text |

        Some extensions may be ignored depending on the server configuration
        (non-extractable binary files). In that case, the server returns a 500 error.
      operationId: uploadFile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [collection, model, file]
              properties:
                collection:
                  type: string
                  description: Name of the target collection
                  example: documents
                model:
                  type: string
                  description: Embedding model used to vectorize the file
                  example: nomic-embed-text
                file:
                  type: string
                  format: binary
                  description: File to index
      responses:
        '200':
          description: File successfully indexed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadFileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags: [Collection]
      summary: Delete a file from a collection
      description: |
        Deletes all Qdrant points associated with a file in a collection.
        No deletion of the source file on disk is performed.
      operationId: deleteFile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteFileRequest'
      responses:
        '200':
          description: File removed from the collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteFileResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  # ─── Agent ──────────────────────────────────────────────────────────────────

  /agent:
    get:
      tags: [Agent]
      summary: List all agents
      description: Returns the list of all agents (RAG and extractors) registered in the database.
      operationId: listAgents
      responses:
        '200':
          description: List of agents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAgentsResponse'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags: [Agent]
      summary: Delete an agent
      description: Deletes an agent by its numeric identifier.
      operationId: deleteAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteAgentRequest'
      responses:
        '200':
          description: Agent deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAgentResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /agent/name:
    get:
      tags: [Agent]
      summary: Retrieve an agent by name
      description: |
        Searches for and returns an agent whose name exactly matches the provided parameter.
        The name is passed in the **request body** (JSON).
      operationId: getAgentByName
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetAgentByNameRequest'
      responses:
        '200':
          description: Agent found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAgentByNameResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /agent/agent:
    post:
      tags: [Agent]
      summary: Create a conversational RAG agent
      description: |
        Creates a conversational agent and automatically initializes:
        - an **initial conversation** associated with the agent
        - a **system message** (role `system`) injected at the start of that conversation with the content of `role`

        The `folder` field designates the Qdrant collection used as the RAG knowledge base.
        If `folder` is non-empty, `embedding_model` is **required** at chat time
        (otherwise chat will return a `folder set but no embedding model` error).
      operationId: createAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentRequest'
      responses:
        '200':
          description: Agent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAgentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  /agent/extractor:
    post:
      tags: [Agent]
      summary: Create an extractor agent
      description: |
        Creates an agent specialized in extracting structured information from text.

        Like `POST /agent/agent`, it automatically creates an initial conversation and a
        system message enriched with the fixed extractor behavior (JSON-only instruction).

        This extractor agent does not use a RAG collection and therefore takes no `folder`.

        The `format` field is a JSON schema object where each key is an expected output field,
        associated with a definition object that must contain a `"type"` field.

        Supported types in the schema:
        - `"string"` — any value is converted to a string
        - `"number"` — expects a `float64` or a parseable numeric string
        - any other type — value is passed through as-is

        The format is validated at creation: returns 400 if the JSON is invalid,
        if the object is empty, or if a field does not have a `"type"`.
      operationId: createExtractor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExtractorRequest'
      responses:
        '200':
          description: Extractor agent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateExtractorResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  # ─── Conversation ────────────────────────────────────────────────────────────

  /conversation:
    get:
      tags: [Conversation]
      summary: List conversations for an agent
      description: |
        Returns all conversations associated with a given agent.
        The `agent_id` is passed in the **request body** (JSON).
      operationId: listConversations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListConversationsRequest'
      responses:
        '200':
          description: List of conversations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListConversationsResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Conversation]
      summary: Create a conversation
      description: |
        Opens a new conversation for an existing agent.
        Automatically injects the agent's `role` as the first system message,
        ensuring each conversation starts with the correct context.
        Returns 404 if the agent is not found.
      operationId: createConversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '200':
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateConversationResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags: [Conversation]
      summary: Delete a conversation
      description: Deletes a conversation and all its associated messages.
      operationId: deleteConversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteConversationRequest'
      responses:
        '200':
          description: Conversation deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteConversationResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ─── Message ─────────────────────────────────────────────────────────────────

  /message:
    get:
      tags: [Message]
      summary: List messages in a conversation
      description: |
        Returns the full message history (user + assistant) of a conversation.
        The `conversation_id` is passed in the **request body** (JSON).
      operationId: listMessages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListMessagesRequest'
      responses:
        '200':
          description: Message history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMessagesResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ─── Inference ───────────────────────────────────────────────────────────────

  /chat:
    post:
      tags: [Inference]
      summary: Chat with an agent (SSE stream)
      description: |
        Sends a prompt to an agent within the context of an existing conversation.
        The response is streamed token by token via **Server-Sent Events**.

        **Execution pipeline:**
        1. Load the agent and the conversation history
        2. If `folder` is set on the agent, RAG search for the `limit` most relevant chunks
           (requires `embedding_model` to be set — otherwise 500 error `folder set but no embedding model`)
        3. Inject the RAG context and history into the prompt
        4. Streaming call to the LLM via Ollama
        5. Persist the prompt (`user`) and the full response (`assistant`) in the database

        **SSE format**: each event contains a text fragment (token or group of tokens).
        The stream ends when the connection is closed by the server.
      operationId: chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: SSE token stream
          content:
            text/event-stream:
              schema:
                type: string
                description: Response fragment generated by the LLM
                example: "Here is the information about leave: employees are entitled to..."
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /extract:
    post:
      tags: [Inference]
      summary: Structured extraction via an extractor agent
      description: |
        Submits text to an extractor agent and returns a structured JSON object
        according to the `format` schema defined at agent creation.

        **Execution pipeline:**
        1. Load the agent — returns 404 if not found, 400 if it is not an extractor
        2. Build the prompt with the text and the schema
        3. Call the LLM in JSON mode (up to `nb` attempts)
        4. Validate and filter the response according to the typed schema
        5. Returns 422 if all attempts fail

        Unlike `/chat`, this route does not persist any messages and does not use history.
      operationId: extract
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtractRequest'
      responses:
        '200':
          description: Extracted data in JSON format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtractResponse'
              example:
                status: 200
                result: '{"date":"01/01/2024","parties":["Smith","Martin"],"amount":5000}'
        '400':
          description: The targeted agent is not an extractor (`not extractor`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 400
                result: not extractor
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Extraction failed — the LLM could not produce valid JSON (`failed to extract`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 422
                result: failed to extract
        '500':
          $ref: '#/components/responses/InternalError'

# ─── Components ───────────────────────────────────────────────────────────────

components:

  # ─── Reusable responses ─────────────────────────────────────────────────────

  responses:
    BadRequest:
      description: Missing or invalid parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: 400
            result: bad request
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: 404
            result: not found
    Conflict:
      description: Resource already exists (UNIQUE constraint)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: 409
            result: UNIQUE constraint failed
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: 500
            result: internal server error

  # ─── Schemas ────────────────────────────────────────────────────────────────

  schemas:

    # ── Generic ─────────────────────────────────────────────────────────────

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
        result:
          type: string

    # ── Model ────────────────────────────────────────────────────────────────

    DownloadModelRequest:
      type: object
      required: [model]
      properties:
        model:
          type: string
          description: Name of the Ollama model to download
          example: llama3.2

    DeleteModelRequest:
      type: object
      required: [model]
      properties:
        model:
          type: string
          description: Name of the Ollama model to delete
          example: llama3.2

    DeleteModelResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        result: {}

    ListModelsResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        result:
          type: array
          items:
            type: string
          example: [llama3.2, nomic-embed-text]

    # ── Collection ───────────────────────────────────────────────────────────

    CreateCollectionRequest:
      type: object
      required: [name, size]
      properties:
        name:
          type: string
          description: Name of the collection to create
          example: documents
        size:
          type: integer
          description: Vector dimension (must match the embedding model, e.g. 768 for nomic-embed-text)
          example: 768

    DeleteCollectionRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: Name of the collection to delete
          example: documents

    DeleteCollectionResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        result: {}

    ListCollectionResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        result:
          type: array
          items:
            type: string
          example: [documents, contracts, faq]

    # ── File ─────────────────────────────────────────────────────────────────

    UploadFileResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        result: {}

    DeleteFileRequest:
      type: object
      required: [collection, name]
      properties:
        collection:
          type: string
          description: Name of the collection containing the file
          example: documents
        name:
          type: string
          description: Name (path) of the file to remove from the collection
          example: report_q3.pdf

    DeleteFileResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        result: {}

    ListFilesRequest:
      type: object
      required: [collection]
      properties:
        collection:
          type: string
          description: Name of the collection whose files are to be listed
          example: documents

    ListFilesResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        result:
          type: array
          items:
            type: string
          example: [report_q3.pdf, contract_smith.docx]

    # ── Agent ────────────────────────────────────────────────────────────────

    CreateAgentRequest:
      type: object
      required: [name, role, folder, model]
      properties:
        name:
          type: string
          description: Unique name of the agent
          example: HR Assistant
        role:
          type: string
          description: System prompt defining the agent's behavior
          example: You are an assistant specialized in human resources. Answer only based on the provided documents.
        folder:
          type: string
          description: |
            Name of the Qdrant collection used as the RAG knowledge base.
            If empty (`""`), the agent answers without documentary context — the LLM relies
            solely on its intrinsic knowledge and the conversation history.
            If non-empty, `embedding_model` is required at chat time.
          example: documents
        model:
          type: string
          description: Ollama model used for generation (LLM)
          example: llama3.2
        embedding_model:
          type: string
          nullable: true
          description: Embedding model to use for RAG search (optional — uses default if absent)
          example: nomic-embed-text

    CreateAgentResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        result:
          $ref: '#/components/schemas/Agent'

    CreateExtractorRequest:
      type: object
      required: [name, role, model, format]
      properties:
        name:
          type: string
          description: Unique name of the extractor agent
          example: Contract Extractor
        role:
          type: string
          description: System prompt for the extractor
          example: You extract key information from legal contracts. Return only the requested JSON.
        model:
          type: string
          description: Ollama model used for extraction
          example: llama3.2
        format:
          type: string
          description: |
            JSON output schema. Each key is an expected output field, associated with a
            definition object that must contain a `"type"` field (`"string"` or `"number"`).
            The optional `"enum"` field can be used to constrain accepted values.
          example: |
            {
              "status": {
                "type": "string",
                "enum": ["Intern", "Apprentice", "Employee", "Engineer", "Researcher", "Consultant", "Manager", "Director", "C-Level", "Founder"]
              },
              "name": {
                "type": "string"
              },
              "salary": {
                "type": "number"
              }
            }

    CreateExtractorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        result:
          $ref: '#/components/schemas/Agent'

    DeleteAgentRequest:
      type: object
      required: [id]
      properties:
        id:
          type: integer
          description: Numeric identifier of the agent to delete
          example: 1

    DeleteAgentResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        result: {}

    ListAgentsResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        result:
          type: array
          items:
            $ref: '#/components/schemas/Agent'

    GetAgentByNameRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: Exact name of the agent to retrieve
          example: HR Assistant

    GetAgentByNameResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        result:
          $ref: '#/components/schemas/Agent'

    Agent:
      type: object
      description: Representation of an agent (RAG or extractor) in the database
      properties:
        id:
          type: integer
          description: Unique auto-incremented identifier
          example: 1
        name:
          type: string
          description: Agent name
          example: HR Assistant
        role:
          type: string
          description: Agent system prompt
          example: You are an assistant specialized in human resources.
        folder:
          type: string
          description: Qdrant collection associated with the agent
          example: documents
        model:
          type: string
          description: LLM model used
          example: llama3.2
        embedding_model:
          type: string
          nullable: true
          description: Embedding model (null if not specified)
          example: nomic-embed-text
        format:
          type: string
          nullable: true
          description: JSON output schema for extractor agents (null for RAG agents)
          example: '{"date": {"type": "string"}, "amount": {"type": "number"}}'

    # ── Conversation ─────────────────────────────────────────────────────────

    CreateConversationRequest:
      type: object
      required: [agent_id]
      properties:
        agent_id:
          type: integer
          description: Identifier of the agent to attach the conversation to
          example: 1

    CreateConversationResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        result:
          $ref: '#/components/schemas/Conversation'

    DeleteConversationRequest:
      type: object
      required: [conversation_id]
      properties:
        conversation_id:
          type: integer
          description: Identifier of the conversation to delete
          example: 1

    DeleteConversationResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        result: {}

    ListConversationsRequest:
      type: object
      required: [agent_id]
      properties:
        agent_id:
          type: integer
          description: Identifier of the agent whose conversations are to be listed
          example: 1

    ListConversationsResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        result:
          type: array
          items:
            $ref: '#/components/schemas/Conversation'

    Conversation:
      type: object
      description: Representation of a conversation in the database
      properties:
        id:
          type: integer
          description: Unique identifier
          example: 1
        agent_id:
          type: integer
          description: Identifier of the associated agent
          example: 1
        created_at:
          type: integer
          description: Unix creation timestamp
          example: 1714000000

    # ── Message ──────────────────────────────────────────────────────────────

    ListMessagesRequest:
      type: object
      required: [conversation_id]
      properties:
        conversation_id:
          type: integer
          description: Identifier of the conversation whose messages are to be listed
          example: 1

    ListMessagesResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        result:
          type: array
          items:
            $ref: '#/components/schemas/Message'

    Message:
      type: object
      description: Message (user or assistant) belonging to a conversation
      properties:
        id:
          type: integer
          description: Unique message identifier
          example: 1
        conversation_id:
          type: integer
          description: Identifier of the parent conversation
          example: 1
        role:
          type: string
          description: Role of the sender
          enum: [user, assistant]
          example: user
        content:
          type: string
          description: Text content of the message
          example: What are the leave rules?
        created_at:
          type: integer
          description: Unix creation timestamp
          example: 1714000000

    # ── Inference ────────────────────────────────────────────────────────────

    ChatRequest:
      type: object
      required: [agent_id, conversation_id, prompt]
      properties:
        agent_id:
          type: integer
          description: Identifier of the agent to query
          example: 1
        conversation_id:
          type: integer
          description: Identifier of the conversation (used to inject history)
          example: 1
        prompt:
          type: string
          description: User message
          example: What leave days are planned for this year?
        limit:
          type: integer
          description: "Maximum number of RAG chunks to inject into context (recommended default: 5)"
          example: 5

    ExtractRequest:
      type: object
      required: [agent_id, text]
      properties:
        agent_id:
          type: integer
          description: Identifier of the extractor agent
          example: 1
        text:
          type: string
          description: Raw text to analyze
          example: Contract signed on 01/01/2024 between Smith and Martin for the sum of $5000.
        nb:
          type: integer
          description: Maximum number of extraction attempts in case of invalid JSON response (recommended default 3)
          example: 3

    ExtractResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        result:
          type: string
          description: Structured JSON according to the typed schema defined in the extractor agent
          example: '{"date":"01/01/2024","parties":"Smith and Martin","amount":5000}'