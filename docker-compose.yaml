services:
  tracy-next:
    container_name: tracy_next
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_ID: "1"
        API_URL: https://api.tracy-ai.com
      no_cache: true
      pull: true
    image: tracy/next
    restart: unless-stopped
    ports:
     - "3001:80"
    environment:
      - API_URL=https://api.tracy-ai.com
    networks:
      - nginx-network

networks:
  nginx-network:
    external: true